<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Biblioteca Discreta | Portal Roarba /title>

        <!-- SEO Meta Tags -->
        <meta name="description"
            content="Explora una colección completa de algoritmos de programación incluyendo ordenamiento, búsqueda, teoría de grafos, programación dinámica, machine learning, y más. Ejemplos interactivos e implementaciones." />
        <meta name="keywords"
            content="algoritmos, estructuras de datos, algoritmos de ordenamiento, algoritmos de búsqueda, algoritmos de grafos, programación dinámica, algoritmos voraces, backtracking, criptografía, machine learning, algoritmos de cadenas, métodos numéricos, programación" />
        <meta name="author" content="Rodrigo Arce" />

        <!-- Open Graph / Social Media Tags -->
        <meta property="og:title" content="La Biblioteca Discreta - Colección Completa de Algoritmos" />
        <meta property="og:description"
            content="Explora una colección completa de algoritmos de programación con ejemplos interactivos e implementaciones." />
        <meta property="og:image" content="https://roarba.com/static/img/algorithms.jpg" />
        <meta property="og:url" content="https://roarba.com/algorithms/" />
        <meta property="og:type" content="website" />

        <!-- Twitter Card Tags -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="La Biblioteca Discreta - Colección Completa de Algoritmos" />
        <meta name="twitter:description"
            content="Explora una colección completa de algoritmos de programación con ejemplos interactivos e implementaciones." />
        <meta name="twitter:image" content="https://roarba.com/static/img/algorithms.jpg" />

        <!-- Canonical URL -->
        <meta rel="canonical" href="https://roarba.com/algorithms/index.html" />

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="../static/css/style.css" rel="stylesheet">
        <link href="../static/css/algorithms.css" rel="stylesheet">

        <!-- Icon -->
        <link rel="icon" href="../static/img/icon.png" type="image/x-icon">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero-section-small">
        <div class="container">
            <br>
            <h1 class="display-4 mb-4 title-gradient-red">La Biblioteca Discreta</h1>
            <h2>
                <b class="red-bold-text">Bienvenido al primer círculo.</b>
            </h2>
            <p class="lead mb-4 hero-narrow-justified">
                <b class="red-bold-text">¡Oh, vasto y misterioso cosmos! ¿Podemos entenderte completamente? ¿Podemos
                    explicarte completamente?</b>
                Los algoritmos son la clave para desbloquear tus secretos. Oh, cosmos, aquí creé una colección
                de algoritmos de programación que pueden ayudarnos a crear una explicación discreta de tu realidad
                continua.
            </p>

            <div class="search-container">
                <input type="text" id="searchBar" class="search-input" placeholder="Buscar algoritmos...">
                <button class="random-btn" onclick="selectRandomAlgorithm()">Algoritmo Aleatorio</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="row">
            <!-- Categories Sidebar -->
            <div class="col-md-3">
                <div class="categories-container">
                    <h3>Categorías</h3>
                    <div class="total-counter mb-3">
                        Total de Algoritmos: <span id="totalCounter">0</span>
                    </div>
                    <div class="category-list">
                        <label class="category-item">
                            <input type="checkbox" value="sorting"> Algoritmos de Ordenamiento
                            <span class="counter" id="sorting-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="searching"> Algoritmos de Búsqueda
                            <span class="counter" id="searching-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="graph"> Algoritmos de Grafos
                            <span class="counter" id="graph-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="dynamic"> Programación Dinámica
                            <span class="counter" id="dynamic-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="greedy"> Algoritmos Voraces
                            <span class="counter" id="greedy-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="backtracking"> Backtracking
                            <span class="counter" id="backtracking-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="cryptographic"> Criptografía
                            <span class="counter" id="cryptographic-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="machine_learning"> Machine Learning
                            <span class="counter" id="machine_learning-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="string"> Algoritmos de Cadenas
                            <span class="counter" id="string-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="numerical"> Métodos Numéricos
                            <span class="counter" id="numerical-counter">(0)</span>
                        </label>
                        <label class="category-item">
                            <input type="checkbox" value="randomized"> Algoritmos Aleatorios
                            <span class="counter" id="randomized-counter">(0)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Algorithms Grid -->
            <div class="col-md-9">
                <div class="algorithms-grid" id="algorithmsGrid">

                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Bootstrap and Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/cosmic-algorithms.js"></script>
    <script src="../static/js/templates.js"></script>
    <script src="../static/js/algorithms.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Cargar navbar
            const navbarContent = document.getElementById('navbar-template').content.cloneNode(true);
            document.getElementById('navbar-placeholder').appendChild(navbarContent);

            // Cargar footer
            const footerContent = document.getElementById('footer-template').content.cloneNode(true);
            document.getElementById('footer-placeholder').appendChild(footerContent);

            // Actualizar año
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });
    </script>
</body>

</html>
